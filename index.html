<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ប្រព័ន្ធគ្រប់គ្រងភ្ញៀវ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="data:,">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>

body{
  margin:0;
  font-family:Khmer OS Battambang;
  background:#eef4ff;
}

.topbar{
  background:#1aa4bd;
  color:white;
  padding:12px;
  display:flex;
  align-items:center;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
  margin-right:10px;
}

.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#111827;
  color:white;
  padding-top:60px;
  transition:0.3s;
  z-index:100;
}

.sidebar a{
  display:block;
  padding:12px;
  cursor:pointer;
  color:white;
  text-decoration:none;
}

.sidebar a:hover{
  background:#1aa4bd;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:99;
}
.title{
  text-align:center;
  margin:15px 0;
  font-weight:bold;
  color:#1aa4bd;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  padding:10px;
}

/* CARD STYLE */
.box{
  text-align:center;
  padding:15px;
  border-radius:14px;
  transition:0.3s;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

/* HOVER EFFECT */
.box:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* COLORS */
.blue{ background:#e8f1ff; color:#ab0a07; }
.purple{ background:#f3e8ff; color:#0252ff; }
.green{ background:#e8ffe9; color:#04c544; }
.orange{ background:#fff3e6; color:#ff9800; }

/* NUMBER STYLE */
.box h1{
  font-size:28px;
  margin-top:5px;
  transition:0.3s;
}

/* SMALL ANIMATION */
.box:hover h1{
  transform:scale(1.1);
}
.container{
  max-width:900px;
  margin:auto;
  padding:12px;
}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 6px 15px rgba(2, 104, 138, 0.709);
}

input{
  width:95%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:8px;

  font-size:16px; /* 🔥 IMPORTANT: stop mobile zoom */
  outline:none;
}

button{
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.add{background:#0b8196;color:white;  box-shadow:0 3px 10px rgba(4, 74, 171, 0.596);  font-family:Khmer OS Battambang;

}
.edit{background:#ffc107;}
.delete{background:#ff4d4d;color:white;}

table{
  width:100%;
  table-layout:fixed; /* 🔥 IMPORTANT */
}
.table-scroll{
  max-height: 420px;   /* 👉 កម្ពស់ list */
  overflow-y: auto;    /* 👉 scroll លើក្រោម */
  overflow-x: auto;    /* 👉 scroll ឆ្វេងស្តាំ */
  border-radius:12px;
  border:1px solid #e3e3e3;
  background:white;
}

/* table width fix */
.table-scroll table{
  width:100%;
  min-width:800px; /* 👉 បង្ខំអោយមាន horizontal scroll */
  border-collapse:collapse;
}

/* header sticky */
.table-scroll thead th{
  position:sticky;
  top:0;
  background:#1aa4bd;
  color:white;
  z-index:10;
}

/* row style */
.table-scroll td,
.table-scroll th{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #eee;
}

/* hover */
.table-scroll tbody tr:hover{
  background:#f2f9ff;
}

/* scrollbar style */
.table-scroll::-webkit-scrollbar{
  width:6px;
  height:6px;
}

.table-scroll::-webkit-scrollbar-thumb{
  background:#1aa4bd;
  border-radius:10px;
}
th,td{
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.page{display:none;}
.highlight{
  background: yellow;
  color: black;
  padding:2px 4px;
  border-radius:4px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="menu-btn" onclick="openMenu()">☰</div>
  <div>គ្រប់គ្រង់ភ្ញៀវ</div>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
  <a onclick="goPage('home')">📊 មើលទិន្នន័យ</a>
  <a onclick="goPage('list')">📋 ចុះឈ្មោះភ្ញៀវ</a>

  <a onclick="goScan()">📷 ស្គែនភ្ញៀវ</a>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="home" class="page">

  <h2 class="title">📊 ទិន្នន័យសរុបរួម</h2>

  <div class="dashboard">

    <div class="card box blue">
      <h4>👥 ភ្ញៀវសរុប</h4>
      <h1 id="totalQR">0</h1>
    </div>

    <div class="card box purple">
      <h4>👥 ភ្ញៀវចងដៃ</h4>
      <h1 id="totalList">0</h1>
    </div>

    <div class="card box green">
      <h4>💵 ដុល្លារ</h4>
      <h1 id="totalUSD">0</h1>
    </div>

    <div class="card box orange">
      <h4>💴 រៀល</h4>
      <h1 id="totalKHR">0</h1>
    </div>

  </div>
  <div class="card">
<div style="width:200px; height:200px;">
  <canvas id="pieChart"></canvas>
</div>
  <canvas id="barChart" height="100"></canvas>
  <br>
 
</div>

</div>



<!-- LIST -->
<div id="list" class="page">

  <div class="card" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">

  <!-- NAME -->
  <input id="name" placeholder="បញ្ជូលឈ្មោះភ្ញៀវ..." 
    style="flex:1;min-width:180px;">

  <!-- NOTE -->
  <input id="note" placeholder="ចំណាំ..." 
    style="flex:1;min-width:150px;">

  <!-- BUTTON -->
  <button class="add" onclick="addData()" 
    style="min-width:120px;">
    រក្សាទុក
  </button>

</div>

<div class="card">
 <input style="width:30%;background-color:#f3f8f9b2;color:black;font-size: 12px;"
      type="text" id="search" placeholder="🔍 ស្វែងរកឈ្មោះ..." onkeyup="searchTable()">
        
     <button onclick="printSelected()" style="background:#9e9e9b;color:white;">
      Print QR
    </button>

    <button onclick="exportSelected()" style="background:#05b041;color:white;">
      📥 Export Excel
    </button>
    <div class="table-scroll">
  <table>
    <thead>
<tr>
  <th style="width:5%;">
    <input type="checkbox" onclick="toggleAll(this)">
  </th>
  <th style="width:10%;">ល.រ</th>
  <th style="width:25%;">ឈ្មោះ</th>
  <th style="width:20%;">QR</th>
  <th style="width:22%;">ចំណាំ</th>
  <th style="width:15%;">កំណត់</th>
</tr>

    <tbody id="tableBody"></tbody>
  </table>
 </div>
  </div>

</div>

<!-- QR MODAL -->
<div id="qrModal" onclick="closeQR()" style="
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  z-index:999;
  justify-content:center;
  align-items:center;
">

  <div onclick="event.stopPropagation()" style="background:white;padding:20px;border-radius:12px;text-align:center;">

    <div id="qrBig"></div>
    <p id="qrText" style="margin-top:10px;"></p>

    <button onclick="downloadQR()" style="
      margin-top:10px;
      background:#1aa4bd;
      color:white;
      padding:8px 12px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    ">
      📥 Download PNG
    </button>

  </div>

</div>

</div>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyBuKVB0z6NVtepmjE33qXxrxs8RcmCOwd0",
  authDomain:"create-db14a.firebaseapp.com",
  projectId:"create-db14a"
});

const db = firebase.firestore();

/* UI */
function openMenu(){
  sidebar.style.left="0";
  overlay.style.display="block";
}

function closeMenu(){
  sidebar.style.left="-260px";
  overlay.style.display="none";
}

function goPage(p){
  document.querySelectorAll(".page").forEach(x=>x.style.display="none");
  document.getElementById(p).style.display="block";
  closeMenu();
}
goPage("home");
function goScan(){
  window.location.href = "scan.html";
}
/* DATA */
let dataList=[];
let search="";
let currentQRText="";

/* ADD */
function addData(){

  let name = document.getElementById("name").value.trim();
  let note = document.getElementById("note")?.value.trim() || "";

  if(!name){
    alert("⚠️ សូមបញ្ចូលឈ្មោះ!");
    return;
  }

  db.collection("qrData").add({
    name: name,
    note: note,
    created: Date.now(),
    createdAt: new Date().toLocaleString("km-KH") // ✅ readable date
  })
  .then(() => {

    // clear input
    document.getElementById("name").value = "";
    if(document.getElementById("note")){
      document.getElementById("note").value = "";
    }

    // optional success message
    console.log("រក្សាបានជោគជ័យ!!");

  })
  .catch(err => {
    console.error("Error saving:", err);
    alert("រក្សាទុកមិនបាន!");
  });

}

/* REALTIME */
db.collection("qrData").onSnapshot(snap=>{
  dataList=[];
  snap.forEach(d=>{
    dataList.push({id:d.id,...d.data()});
  });
  render();
  document.getElementById("totalQR").innerText=dataList.length;
  // CALL CHART
renderCharts(
  dataList.length,
  Number(document.getElementById("totalList").innerText) || 0,
  Number(document.getElementById("totalUSD").innerText.replace(/,/g,'')) || 0,
  Number(document.getElementById("totalKHR").innerText.replace(/,/g,'')) || 0
);
});

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
  search=e.target.value.toLowerCase();
  render();
});

/* RENDER */
function render(){

  let html="";
  let no=1;

  dataList.forEach(i=>{
    if(i.name.toLowerCase().includes(search)){

      html += `
<tr>
  <td><input type="checkbox" class="cb" value="${i.id}"></td>
  <td>${no++}</td>
  <td>${i.name}</td>

  <!-- QR -->
  <td style="text-align:center;">
    <div id="qr-${i.id}" style="display:flex;justify-content:center;align-items:center;"></div>
  </td>

  <!-- NOTE -->
  <td style="font-size:12px;color:#555;">
    ${i.note || "-"}
  </td>

  <!-- ACTION -->
  <td>
    <button class="edit" onclick="edit('${i.id}','${i.name}')">✏️</button>
    <button class="delete" onclick="del('${i.id}')">🗑</button>
  </td>
</tr>`;
    }
  });

  document.getElementById("tableBody").innerHTML=html;

  setTimeout(()=>{
    dataList.forEach(i=>{
      let el=document.getElementById("qr-"+i.id);

      if(el){
        el.innerHTML="";
        let div=document.createElement("div");

        new QRCode(div,{
          text:i.name,   // QR = NAME ONLY
          width:70,
          height:70
        });

        div.onclick=()=>showQR(i.name);
        el.appendChild(div);
      }
    });
  },100);
}

/* QR SHOW */
function showQR(text){

  currentQRText=text;

  document.getElementById("qrModal").style.display="flex";
  document.getElementById("qrBig").innerHTML="";
  document.getElementById("qrText").innerText=text;

  new QRCode(document.getElementById("qrBig"),{
    text:text,
    width:250,
    height:250
  });
}

/* DOWNLOAD */
function downloadQR(){

  let canvas=document.querySelector("#qrBig canvas");
  if(!canvas){
    alert("QR not ready!");
    return;
  }

  let a=document.createElement("a");
  a.href=canvas.toDataURL("image/png");
  a.download=currentQRText+".png";
  a.click();
}

function closeQR(){
  document.getElementById("qrModal").style.display="none";
  document.getElementById("qrBig").innerHTML="";
}

function edit(id, name, note = ""){

  let newName = prompt("កែឈ្មោះ", name);
  if(newName === null) return;

  let newNote = prompt("កែចំណាំ", note);
  if(newNote === null) return;

  db.collection("qrData").doc(id).update({
    name: newName.trim(),
    note: newNote.trim()
  })
  .then(()=>{
    console.log("Updated successfully");
  })
  .catch(err=>{
    alert("Error: " + err);
  });

}

/* DELETE */
function del(id){
  if(confirm("Delete?")){
    db.collection("qrData").doc(id).delete();
  }
}

/* SELECT */
function toggleAll(cb){
  document.querySelectorAll(".cb").forEach(c=>{
    c.checked=cb.checked;
  });
}

function getSelected(){
  let ids=[...document.querySelectorAll(".cb:checked")].map(x=>x.value);
  return dataList.filter(d=>ids.includes(d.id));
}

/* PRINT */
function printSelected(){

  let items=getSelected();
  if(!items.length) return alert("Select items");

  let w=window.open("");

  let html="<div style='display:grid;grid-template-columns:repeat(5,1fr);gap:1px;font-family:Khmer OS Battambang;'>";

  items.forEach(i=>{
    html+=`
    <div style="border:2px solid #1aa4bd;padding:10px;text-align:center;">
      <div id="p-${i.id}"></div>
      <div style="font-size:12px;color:#1aa4bd;">${i.name}</div>
    </div>`;
  });

  html+="</div>";

  w.document.write(html);

  setTimeout(()=>{
    items.forEach(i=>{
      let el=w.document.getElementById("p-"+i.id);
      new QRCode(el,{text:i.name,width:100,height:100});
    });

    setTimeout(()=>w.print(),500);
  },300);
}

/* EXCEL */
async function exportSelected(){

  let items = getSelected();
  if(!items.length) return alert("Select items");

  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet("QR Invoice");

  // ======================
  // PAGE STYLE
  // ======================
  ws.properties.defaultRowHeight = 20;

  ws.columns = [
    { width: 8 },   // No
    { width: 28 },  // Name
    { width: 22 }   // QR
  ];

  // CENTER ALL COLUMNS
  ws.getColumn(1).alignment = { horizontal: "center", vertical: "middle" };
  ws.getColumn(2).alignment = { horizontal: "center", vertical: "middle" };
  ws.getColumn(3).alignment = { horizontal: "center", vertical: "middle" };

  // ======================
  // TITLE (TOP HEADER)
  // ======================
  const title = ws.addRow(["បញ្ជីឈ្មោះភ្ញៀវ"]);

  ws.mergeCells("A1:C1");

  title.font = {
    bold: true,
    size: 18,
    name: "Khmer OS Battambang",
    color: { argb: "FFFFFFFF" }
  };

  title.alignment = {
    horizontal: "center",
    vertical: "middle"
  };

  title.height = 35;

  ws.getCell("A1").fill = {
    type: "pattern",
    pattern: "solid",
    fgColor: { argb: "FF1AA4BD" }
  };

  // ======================
  // HEADER ROW
  // ======================
  const header = ws.addRow(["លេខរៀង", "ឈ្មោះ", "QR"]);

  header.height = 25;

  header.font = {
    bold: true,
    color: { argb: "FFFFFFFF" },
    name: "Khmer OS Battambang",
    size: 12
  };

  header.alignment = {
    horizontal: "center",
    vertical: "middle"
  };

  header.eachCell(cell => {
    cell.fill = {
      type: "pattern",
      pattern: "solid",
      fgColor: { argb: "FF1AA4BD" }
    };

    cell.border = {
      top: { style: "thin" },
      left: { style: "thin" },
      bottom: { style: "thin" },
      right: { style: "thin" }
    };
  });

  let no = 1;

  // ======================
  // DATA ROWS
  // ======================
  for(const i of items){

    let row = ws.addRow([no++, i.name, ""]);

    row.height = 70;

    row.font = {
      name: "Khmer OS Battambang",
      size: 11
    };

    row.alignment = {
      horizontal: "center",
      vertical: "middle"
    };

    row.eachCell(cell => {
      cell.border = {
        top: { style: "thin" },
        left: { style: "thin" },
        bottom: { style: "thin" },
        right: { style: "thin" }
      };
    });

    // ======================
    // QR GENERATE
    // ======================
    let div = document.createElement("div");
    document.body.appendChild(div);
    div.style.position = "absolute";
    div.style.left = "-9999px";

    new QRCode(div, {
      text: i.name,
      width: 120,
      height: 120
    });

    await new Promise(r => setTimeout(r, 300));

    let canvas = div.querySelector("canvas");

    if(canvas){

      let img = canvas.toDataURL("image/png");

      let id = wb.addImage({
        base64: img,
        extension: "png"
      });

      // ======================
      // CENTER QR IMAGE
      // ======================
      ws.addImage(id, {
        tl: { col: 2, row: row.number - 1, colOff: 15, rowOff: 10 },
        ext: { width: 55, height: 55 }
      });
    }

    document.body.removeChild(div);
  }

  // ======================
  // SUMMARY FOOTER
  // ======================
  const summary = ws.addRow([]);
  const total = ws.addRow([
    "",
    "សរុបភ្ញៀវ",
    items.length
  ]);

  total.font = {
    bold: true,
    size: 12,
    name: "Khmer OS Battambang"
  };

  total.fill = {
    type: "pattern",
    pattern: "solid",
    fgColor: { argb: "" }
  };

  total.alignment = {
    horizontal: "center",
    vertical: "middle"
  };

  total.eachCell(cell => {
    cell.border = {
      top: { style: "thin" },
      left: { style: "thin" },
      bottom: { style: "thin" },
      right: { style: "thin" }
    };
  });

  // ======================
  // EXPORT FILE
  // ======================
  const buf = await wb.xlsx.writeBuffer();

  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([buf]));
  a.download = "បញ្ជីឈ្មោះភ្ញៀវ.xlsx";
  a.click();
}
db.collection("qr_payments")
.onSnapshot(snap=>{

  let count = 0;
  let totalUSD = 0;
  let totalKHR = 0;

  snap.forEach(doc=>{
    const d = doc.data();

    count++;
    totalUSD += Number(d.usd || 0);
    totalKHR += Number(d.khr || 0);
  });

  document.getElementById("totalList").innerText = count;
  document.getElementById("totalUSD").innerText = totalUSD.toLocaleString();
  document.getElementById("totalKHR").innerText = totalKHR.toLocaleString();

// CALL CHART
renderCharts(
  dataList.length,
  count,
  totalUSD,
  totalKHR
);
});
let barChart, pieChart;

function renderCharts(totalQR, totalList, totalUSD, totalKHR){

  // Destroy old charts (important)
  if(barChart) barChart.destroy();
  if(pieChart) pieChart.destroy();

  // ===== BAR CHART =====
  barChart = new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
      labels: ["ភ្ញៀវសរុប", "ភ្ញៀវចងដៃ"],
      datasets: [{
        label: "ចំនួន",
        data: [totalQR, totalList]
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      }
    }
  });

  // ===== PIE CHART =====
  pieChart = new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
      labels: ["ដុល្លារ", "រៀល"],
      datasets: [{
        data: [totalUSD, totalKHR]
      }]
    },
    options: {
      responsive: true
    }
  });

}
</script>

</body>
</html>
