<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Firebase PRO MAX EXPORT IMAGE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="data:,">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<style>

body{
  margin:0;
  font-family:Khmer OS Battambang;
  background:#eef4ff;
}

.topbar{
  background:#1aa4bd;
  color:white;
  padding:12px;
  display:flex;
  align-items:center;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
  margin-right:10px;
}

.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#111827;
  color:white;
  padding-top:60px;
  transition:0.3s;
  z-index:100;
}

.sidebar a{
  display:block;
  padding:12px;
  cursor:pointer;
  color:white;
  text-decoration:none;
}

.sidebar a:hover{
  background:#1aa4bd;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  size: 14px;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:99;
}

.container{
  max-width:900px;
  margin:auto;
  padding:12px;
}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 6px 15px rgba(2, 104, 138, 0.709);
}

input{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.add{background:#0b8196;color:white;  box-shadow:0 3px 10px rgba(4, 74, 171, 0.596);  font-family:Khmer OS Battambang;

}
.edit{background:#ffc107;}
.delete{background:#ff4d4d;color:white;}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.page{display:none;}

</style>
</head>

<body>

<div class="topbar">
  <div class="menu-btn" onclick="openMenu()">☰</div>
  <div>គ្រប់គ្រង់ភ្ញៀវ</div>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
  <a onclick="goPage('home')">📊 មើលទិន្នន័យ</a>
  <a onclick="goPage('list')">📋 ចុះឈ្មោះភ្ញៀវ</a>

  <a onclick="goScan()">📷 ស្គែនភ្ញៀវ</a>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="home" class="page">

  <h2 style="text-align:center;margin-top:10px;">📊 ទិន្នន័យសរុបរួម</h2>

  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;">

    <div class="card" style="text-align:center;background:#e8f1ff;color: #ab0a07;">
      <h4>👥 ភ្ញៀវសរុប</h4>
      <h1 id="totalQR">0</h1>
    </div>
     <div class="card" style="text-align:center;background:#f3e8ff;color: #0252ff">
      <h4>👥 ភ្ញៀវចងដៃ</h4>
      <h1 id="totalList">0</h1>
    </div>

    <div class="card" style="text-align:center;background:#e8ffe9;color: #04c544">
      <h4>💵ដុល្លារ</h4>
      <h1 id="totalUSD">0</h1>
    </div>

    <div class="card" style="text-align:center;background:#fff3e6;color: #a77f05">
      <h4>💴 រៀល</h4>
      <h1 id="totalKHR">0</h1>
    </div>

   

  </div>
  

</div>



<!-- LIST -->
<div id="list" class="page">

  <div class="card" style="display:flex;gap:10px;">
    <input id="name" placeholder="បញ្ជូលឈ្មះភ្ញៀវ...">
    <button class="add" onclick="addData()">រក្សាទុក</button>
  </div>

  <div class="card" style="display:flex;gap:10px;">
    <input id="search" placeholder="ស្វែងរក...">

   
  </div>

  <div class="card">
     <button onclick="printSelected()" style="background:#9e9e9b;color:white;">
      Print QR
    </button>

    <button onclick="exportSelected()" style="background:#05b041;color:white;">
      📥 Export Excel
    </button>
    <table>
      <thead>
        <tr>
          <th><input type="checkbox" onclick="toggleAll(this)"></th>
          <th>#</th>
          <th>ឈ្មោះ</th>
          <th>QR</th>
          <th>ជម្រើស</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<!-- QR MODAL -->
<div id="qrModal" onclick="closeQR()" style="
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  z-index:999;
  justify-content:center;
  align-items:center;
">

  <div onclick="event.stopPropagation()" style="background:white;padding:20px;border-radius:12px;text-align:center;">

    <div id="qrBig"></div>
    <p id="qrText" style="margin-top:10px;"></p>

    <button onclick="downloadQR()" style="
      margin-top:10px;
      background:#1aa4bd;
      color:white;
      padding:8px 12px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    ">
      📥 Download PNG
    </button>

  </div>

</div>

</div>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyBuKVB0z6NVtepmjE33qXxrxs8RcmCOwd0",
  authDomain:"create-db14a.firebaseapp.com",
  projectId:"create-db14a"
});

const db = firebase.firestore();

/* UI */
function openMenu(){
  sidebar.style.left="0";
  overlay.style.display="block";
}

function closeMenu(){
  sidebar.style.left="-260px";
  overlay.style.display="none";
}

function goPage(p){
  document.querySelectorAll(".page").forEach(x=>x.style.display="none");
  document.getElementById(p).style.display="block";
  closeMenu();
}
goPage("home");
function goScan(){
  window.location.href = "scan.html";
}
/* DATA */
let dataList=[];
let search="";
let currentQRText="";

/* ADD */
function addData(){
  let name=document.getElementById("name").value.trim();
  if(!name) return;

  db.collection("qrData").add({
    name,
    created:Date.now()
  });

  document.getElementById("name").value="";
}

/* REALTIME */
db.collection("qrData").onSnapshot(snap=>{
  dataList=[];
  snap.forEach(d=>{
    dataList.push({id:d.id,...d.data()});
  });
  render();
  document.getElementById("totalQR").innerText=dataList.length;
});

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
  search=e.target.value.toLowerCase();
  render();
});

/* RENDER */
function render(){

  let html="";
  let no=1;

  dataList.forEach(i=>{
    if(i.name.toLowerCase().includes(search)){

      html+=`
      <tr>
        <td><input type="checkbox" class="cb" value="${i.id}"></td>
        <td>${no++}</td>
        <td>${i.name}</td>
        <td><div id="qr-${i.id}"></div></td>
        <td>
          <button class="edit" onclick="edit('${i.id}','${i.name}')">✏️</button>
          <button class="delete" onclick="del('${i.id}')">🗑</button>
        </td>
      </tr>`;
    }
  });

  document.getElementById("tableBody").innerHTML=html;

  setTimeout(()=>{
    dataList.forEach(i=>{
      let el=document.getElementById("qr-"+i.id);

      if(el){
        el.innerHTML="";
        let div=document.createElement("div");

        new QRCode(div,{
          text:i.name,   // QR = NAME ONLY
          width:70,
          height:70
        });

        div.onclick=()=>showQR(i.name);
        el.appendChild(div);
      }
    });
  },100);
}

/* QR SHOW */
function showQR(text){

  currentQRText=text;

  document.getElementById("qrModal").style.display="flex";
  document.getElementById("qrBig").innerHTML="";
  document.getElementById("qrText").innerText=text;

  new QRCode(document.getElementById("qrBig"),{
    text:text,
    width:250,
    height:250
  });
}

/* DOWNLOAD */
function downloadQR(){

  let canvas=document.querySelector("#qrBig canvas");
  if(!canvas){
    alert("QR not ready!");
    return;
  }

  let a=document.createElement("a");
  a.href=canvas.toDataURL("image/png");
  a.download=currentQRText+".png";
  a.click();
}

function closeQR(){
  document.getElementById("qrModal").style.display="none";
  document.getElementById("qrBig").innerHTML="";
}

/* EDIT */
function edit(id,name){
  let n=prompt("Edit",name);
  if(n){
    db.collection("qrData").doc(id).update({name:n});
  }
}

/* DELETE */
function del(id){
  if(confirm("Delete?")){
    db.collection("qrData").doc(id).delete();
  }
}

/* SELECT */
function toggleAll(cb){
  document.querySelectorAll(".cb").forEach(c=>{
    c.checked=cb.checked;
  });
}

function getSelected(){
  let ids=[...document.querySelectorAll(".cb:checked")].map(x=>x.value);
  return dataList.filter(d=>ids.includes(d.id));
}

/* PRINT */
function printSelected(){

  let items=getSelected();
  if(!items.length) return alert("Select items");

  let w=window.open("");

  let html="<div style='display:grid;grid-template-columns:repeat(5,1fr);gap:1px;font-family:Khmer OS Battambang;'>";

  items.forEach(i=>{
    html+=`
    <div style="border:2px solid #1aa4bd;padding:10px;text-align:center;">
      <div id="p-${i.id}"></div>
      <div style="font-size:12px;color:#1aa4bd;">${i.name}</div>
    </div>`;
  });

  html+="</div>";

  w.document.write(html);

  setTimeout(()=>{
    items.forEach(i=>{
      let el=w.document.getElementById("p-"+i.id);
      new QRCode(el,{text:i.name,width:100,height:100});
    });

    setTimeout(()=>w.print(),500);
  },300);
}

/* EXCEL */
async function exportSelected(){

  let items=getSelected();
  if(!items.length) return alert("Select items");

  const wb=new ExcelJS.Workbook();
  const ws=wb.addWorksheet("QR");

  ws.columns=[
    {header:"No"},
    {header:"Name"},
    {header:"QR"}
  ];

  let no=1;

  for(const i of items){

    let row=ws.addRow([no++,i.name,""]);

    let div=document.createElement("div");
    document.body.appendChild(div);
    div.style.position="absolute";
    div.style.left="-9999px";

    new QRCode(div,{
      text:i.name,
      width:120,
      height:120
    });

    await new Promise(r=>setTimeout(r,300));

    let canvas=div.querySelector("canvas");

    if(canvas){
      let img=canvas.toDataURL("image/png");

      let id=wb.addImage({
        base64:img,
        extension:"png"
      });

      ws.addImage(id,{
        tl:{col:2,row:row.number-1},
        ext:{width:80,height:80}
      });
    }

    document.body.removeChild(div);
  }

  let buf=await wb.xlsx.writeBuffer();
  let a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([buf]));
  a.download="QR_EXPORT.xlsx";
  a.click();
}
db.collection("qr_payments")
.onSnapshot(snap=>{

  let count = 0;
  let totalUSD = 0;
  let totalKHR = 0;

  snap.forEach(doc=>{
    const d = doc.data();

    count++;
    totalUSD += Number(d.usd || 0);
    totalKHR += Number(d.khr || 0);
  });

  document.getElementById("totalList").innerText = count;
  document.getElementById("totalUSD").innerText = totalUSD.toLocaleString();
  document.getElementById("totalKHR").innerText = totalKHR.toLocaleString();

});

</script>

</body>
</html>
