<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<title>ស្គែនឈ្មោះ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
body{
  margin:0;
  font-family:"Khmer OS Battambang",Arial;
  background:#eef3f8;
}

.appbar{
  background:linear-gradient(135deg,#1aa4bd,#0d6efd);
  color:#fff;
  padding:16px;
  text-align:center;
  font-weight:bold;
}

.card{
  background:#fff;
  margin:10px;
  padding:10px;
  border-radius:14px;
  box-shadow:0 6px 15px rgba(2, 104, 138, 0.709);
}

.row{display:flex;gap:10px;}

.btn{
  padding:12px;
  border:none;
  border-radius:4px;
  color:#0973a4;
   box-shadow:0 3px 10px rgba(121, 123, 123, 0.786);
  width:100%;
  font-weight:bold;
}
.home-btn{
  padding:10px 14px;
  color:rgb(234, 70, 21);
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-family:Khmer OS Battambang;
  font-size:14px;
  box-shadow:0 3px 10px rgba(4, 74, 171, 0.596);
  transition:0.3s;
}

.home-btn:hover{
  background:#6cb704;
  transform:scale(1.05);
}
.scan{background:#ebc4c49d;}
.upload{background:#c1c1b996;}
.btn.scan{
  padding:10px 14px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-family:Khmer OS Battambang;
  font-size:4px;
  box-shadow:0 3px 10px rgba(4, 74, 171, 0.596);
  transition:0.3s;
}


#reader{
  position:relative;
}

/* 🔥 Scan line */
.scan-line{
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:3px;
  background:linear-gradient(90deg,transparent,#00e5ff,transparent);
  box-shadow:0 0 10px #00e5ff;
  display:none;
  animation:scanMove 1.2s linear infinite;
}

@keyframes scanMove{
  0%{top:0;}
  100%{top:100%;}
}
table{
  width:150%;
  border-collapse:collapse;
}
.table-scroll{
  max-height:450px;
  overflow-y: auto;
  overflow-x: auto;
  margin-top:10px;
  border-radius:10px;
}

/* ✅ ដាក់នៅ table */
.table-scroll table{
  min-width: 600px; /* 👉 បង្ខំ scroll */
}
/* Hover row */
tbody tr:hover{
  background:#f1f7ff;
}
th{
  background:#1aa4bd;
  color:#fff;
  padding:10px;
}

td{
  padding:8px;
  border-bottom:1px solid #a1c9dd76;
}

.ok{
  color:#0d6efd;
  font-weight:bold;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  justify-content:center;
  align-items:center;
}

.box{
  background:#fff;
  width:90%;
  max-width:340px;
  padding:15px;
  border-radius:12px;
}

input{
  width:95%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:8px;

  font-size:16px; /* 🔥 IMPORTANT: stop mobile zoom */
  outline:none;
}

/* focus style */
input:focus{
  border-color:#0d6efd;
  box-shadow:0 0 6px rgba(13,110,253,0.3);
}

.save{
  background:#1aa4bd;
  color:#fff;
  border:none;
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.close{
  background:#ff4d4d;
  color:#fff;
  border:none;
  width:30%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
}

#loadingOverlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  color:#fff;
  font-size:18px;
  font-weight:bold;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.highlight{
  background: yellow;
  color: black;
  padding:2px 4px;
  border-radius:4px;
  font-weight:bold;
}
#totalGuest{color:#0d6efd;font-size:18px;}
#totalUSD{color:#28a745;font-size:18px;font-weight:bold;}
#totalKHR{color:#ff9800;font-size:18px;font-weight:bold;}
</style>
</head>

<body>


<div class="card">
  <div class="row">
    <button class="home-btn" onclick="goBack()">ត្រឡប</button>

<button class="btn scan" onclick="startScan()">
  <img src="image.png" alt="scan" style="width:40px;height:40px;">
  

</button>

    <label class="btn upload">
      📁 Upload
      <input type="file" hidden accept="image/*" onchange="scanImage(this)">
    </label>
  </div>
</div>
<div>
 
<p id="result" style="text-align: center;color: #ffffff;background-color: #ffffff;"></p>
</div>
<div id="reader">
  <div class="scan-line"></div>
 
</div>
<!-- TOTAL -->
<div class="card">
  <p>👥 ភ្ញៀវចងដៃ: <b id="totalGuest">0</b> នាក់</p>
  <p>💵 ដុល្លារ: <b id="totalUSD">0</b> $</p>
  <p>💴 រៀល: <b id="totalKHR">0</b> ៛</p>
</div>

<!-- TABLE -->
<div class="card">
  <div>
  <input style="width:30%;background-color:#f3f8f9b2;color:black;font-size: 12px;"
    type="text" id="searchBox" placeholder="🔍 ស្វែងរកឈ្មោះ..." onkeyup="searchTable()">
  <button onclick="exportExcel()" style="
  padding:10px 14px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:8px;
  margin:10px;
  font-weight:bold;
">
📥 Export Excel
</button>

    <div class="table-scroll">
      <table style="width:100%; min-width:700px; table-layout:fixed;">
        <thead>
          <tr>
            <th style="width:20%;">ឈ្មោះ</th>
            <th style="width:10%;">ដុល្លារ</th>
            <th style="width:15%;">រៀល</th>
             <th style="width:15%;">បរិច្ឆេទ</th>
            <th style="width:35%;">ចាំណាំ</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box">
    <h3>📌 Scan Info</h3>

    <label>Name</label>
    <input id="name" readonly>

    <label>USD</label>
    <input id="usd" type="number">

    <label>KHR</label>
    <input id="khr" type="number">

    <!-- 🆕 Note input -->
    <label>ចំណាំ</label>
    <input id="note" type="text" placeholder="បញ្ចូលចំណាំ...">

    <button class="save" onclick="save()">💾 Save</button>
    <button class="close" onclick="closeModal()">❌ Close</button>
  </div>
</div>

<div id="loadingOverlay">⏳ កំពុងរក្សាទុក...</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBuKVB0z6NVtepmjE33qXxrxs8RcmCOwd0",
  authDomain:"create-db14a.firebaseapp.com",
  projectId:"create-db14a"
});

const db = firebase.firestore();
const qr = new Html5Qrcode("reader");

// 🔊 SOUND HERE 👇
let scanSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
scanSound.preload = "auto";
scanSound.volume = 1;
const modal = document.getElementById("modal");
const nameInput = document.getElementById("name");
const usdInput = document.getElementById("usd");
const khrInput = document.getElementById("khr");
const noteInput = document.getElementById("note"); // ✅ add this
const tableBody = document.getElementById("tableBody");

let scanned = false;
let cameraRunning = false;

/* TELEGRAM */
const BOT_TOKEN = "7654128263:AAG7Bfl_kPF9aOnE0hltHpCGqQlTE1H9wCg";
const CHAT_ID = "6567570219";


async function sendToTelegram(data){

  const text =
`
👤 <b>ឈ្មោះ:</b> ${data.name}
💵 <b>ដុល្លារ:</b> <code>$${data.usd}</code>
💴 <b>រៀល:</b> <code>${data.khr}៛</code>
━━━━━━━━━━━━━━
⏰ <b>Time:</b> ${new Date().toLocaleString()}
`;

  try{

    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        chat_id: CHAT_ID,
        text: text,
        parse_mode: "HTML"
      })
    });

    const result = await res.json();
    console.log("Telegram result:", result);

    if(!result.ok){
      alert("Telegram Error: " + result.description);
    }

  }catch(err){
    console.log("Telegram fetch failed:", err);
    alert("Telegram network error");
  }
}

function searchTable(){

  const input = document.getElementById("searchBox");
  const filter = input.value.toLowerCase();
  const rows = document.querySelectorAll("#tableBody tr");

  rows.forEach(row => {

    const cell = row.cells[0]; // name column
    const text = cell.innerText;

    // reset original text (remove highlight)
    cell.innerHTML = text;

    if(filter === ""){
      row.style.display = "";
      return;
    }

    if(text.toLowerCase().includes(filter)){
      row.style.display = "";

      // highlight matched text
      const regex = new RegExp(filter.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), "gi");
      cell.innerHTML = text.replace(regex, match => 
        `<span class="highlight">${match}</span>`
      );

    } else {
      row.style.display = "none";
    }

  });

}
async function getBestCameraId(){

  const cams = await Html5Qrcode.getCameras();

  if(!cams.length){
    throw new Error("No camera found");
  }

  let selected = cams[0].id;

  for(const cam of cams){
    const name = (cam.label || "").toLowerCase();

    if(name.includes("back") || name.includes("rear")){
      return cam.id; // 📱 mobile back camera
    }

    if(name.includes("usb") || name.includes("webcam")){
      selected = cam.id;
    }
  }

  return selected;
}
/* CLEAN */
function goBack(){
  window.location.href = "index.html";
}
function clean(t){
  return (t||"").replace(/[\uFFFD�]/g,"").trim();
}
async function startScan(){
  try{

    const cameraId = await getBestCameraId();

    if(cameraRunning){
      await safeStop();
    }

    scanned = false;
    cameraRunning = true;

    showScanLine();

    // 🔥 ដាក់ទីនេះ (UNLOCK SOUND)
    scanSound.play().then(()=>{
      scanSound.pause();
      scanSound.currentTime = 0;
    });

    await qr.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      async (decodedText)=>{

        // 🔊 sound ពេល scan ជោគជ័យ
        scanSound.currentTime = 0;
        scanSound.play().catch(()=>{});

        navigator.vibrate?.(150);

        document.getElementById("result").innerText = decodedText;

        if(scanned) return;
        scanned = true;

        await safeStop();
        hideScanLine();
        openModal(decodedText);

      },
      (err)=>{}
    );

  }catch(e){
    hideScanLine();
    alert("Camera Error: " + e.message);
  }
}
async function safeStop(){
  try{
    if(cameraRunning){
      await qr.stop();
    }
  }catch(e){
    console.log("stop error:", e);
  }
  cameraRunning = false;
}
function showScanLine(){
  const line = document.querySelector(".scan-line");
  if(line) line.style.display = "block";
}

function hideScanLine(){
  const line = document.querySelector(".scan-line");
  if(line) line.style.display = "none";
}



/* IMAGE */
async function scanImage(input){
  const file=input.files[0];
  const text=await qr.scanFile(file);
  openModal(text);
}

/* MODAL */
function openModal(name){
  modal.style.display="flex";
  nameInput.value=clean(name);
  usdInput.value="";
  khrInput.value="";
  noteInput.value=""; // reset note
}

function closeModal(){
  modal.style.display="none";
}

/* SAVE */
async function save(){

  const loading=document.getElementById("loadingOverlay");
  loading.style.display="flex";

const noteInput = document.getElementById("note");

const data={
  name:nameInput.value,
  usd:Number(usdInput.value)||0,
  khr:Number(khrInput.value)||0,
  note:noteInput.value,
  time:Date.now(),
  createdAt: new Date().toLocaleString() // ✅ FIX
};

  try{

    await db.collection("qr_payments").add(data);

    await sendToTelegram(data);

    modal.style.display="none";

    await safeStop();

    setTimeout(()=>location.reload(),800);

  }catch(err){
    alert(err);
  }finally{
    loading.style.display="none";
  }
}

/* REALTIME + TOTAL */
db.collection("qr_payments")
.orderBy("time","desc")
.onSnapshot(snap=>{

  let html="";
  let totalUSD=0;
  let totalKHR=0;
  let count=0;

  snap.forEach(doc=>{
    const d=doc.data();

    count++;
    totalUSD+=Number(d.usd||0);
    totalKHR+=Number(d.khr||0);

html+=`
<tr>
  <td class="ok">${d.name||""}</td>
  <td style="color:#28a745;font-weight:bold;">${d.usd||0} $</td>
  <td style="color:#ff9800;font-weight:bold;">${d.khr||0} ៛</td>
  <td style="color:#6c757d;">${d.createdAt||""}</td>
  <td style="color:#6c757d;font-size:12px">${d.note||""}</td>
</tr>
`;
  });

  tableBody.innerHTML=html;

  document.getElementById("totalGuest").innerText=count;
  document.getElementById("totalUSD").innerText=totalUSD.toLocaleString();
  document.getElementById("totalKHR").innerText=totalKHR.toLocaleString();

});


async function exportExcel(){

  const workbook = new ExcelJS.Workbook();
  const sheet = workbook.addWorksheet("INVOICE");

  // ======================
  // 🧾 TITLE
  // ======================
  sheet.mergeCells("A1:F1");
  const title = sheet.getCell("A1");

  title.value = "បញ្ជីចំណងដៃ";
  title.font = {
    name: "Khmer OS Battambang",
    bold: true,
    size: 18,
    color: { argb: "FFFFFFFF" }
  };

  title.alignment = {
    horizontal: "center",
    vertical: "middle"
  };

  title.fill = {
    type: "pattern",
    pattern: "solid",
    fgColor: { argb: "FF1AA4BD" } // blue
  };

  // ======================
  // HEADER ROW
  // ======================
  const headerRow = sheet.addRow([
    "លេខរៀង",
    "ឈ្មោះ",
    "ដុល្លារ",
    "រៀល",
    "បរិច្ចេក",
    "ចំណាំ"
  ]);

  headerRow.eachCell(cell=>{
    cell.font = {
      name: "Khmer OS Battambang",
      bold: true,
      color: { argb: "FFFFFFFF" }
    };

    cell.alignment = {
      horizontal: "center",
      vertical: "middle"
    };

    cell.fill = {
      type: "pattern",
      pattern: "solid",
      fgColor: { argb: "FF0D6EFD" }
    };

    cell.border = {
      top: { style: "thin" },
      left: { style: "thin" },
      right: { style: "thin" },
      bottom: { style: "thin" }
    };
  });

  let no = 1;
  let totalUSD = 0;
  let totalKHR = 0;
  let count = 0;

  const snap = await db.collection("qr_payments")
    .orderBy("time","desc")
    .get();

  snap.forEach(doc=>{
    const d = doc.data();

    const row = sheet.addRow([
      no++,
      d.name || "",
      d.usd || 0,
      d.khr || 0,
      d.createdAt || "",
      d.note || ""
    ]);

    totalUSD += Number(d.usd || 0);
    totalKHR += Number(d.khr || 0);
    count++;

    // ======================
    // ROW STYLE (ZEBRA)
    // ======================
    const bg = (no % 2 === 0) ? "FFF5FAFF" : "FFFFFFFF";

    row.eachCell(cell=>{
      cell.font = { name:"Khmer OS Battambang" };

      cell.fill = {
        type: "pattern",
        pattern: "solid",
        fgColor: { argb: bg }
      };

      cell.border = {
        top: { style: "thin" },
        left: { style: "thin" },
        right: { style: "thin" },
        bottom: { style: "thin" }
      };
    });
  });

  // ======================
  // SUMMARY TITLE
  // ======================
  sheet.addRow([]);
  const summaryTitle = sheet.addRow([" ទិន្នន័យសរុបរួម"]);

  summaryTitle.font = {
    name:"Khmer OS Battambang",
    bold: true,
    size: 14
  };

  summaryTitle.alignment = { horizontal:"center" };

  // ======================
  // SUMMARY DATA
  // ======================
  const s1 = sheet.addRow([" សរុបភ្ញៀវចងដៃ", count]);
  const s2 = sheet.addRow([" សរុបដុល្លារ", totalUSD]);
  const s3 = sheet.addRow([" សរុបរៀល", totalKHR]);

  [s1,s2,s3].forEach(r=>{
    r.eachCell(cell=>{
      cell.font = { name:"Khmer OS Battambang" };

      cell.fill = {
        type: "pattern",
        pattern: "solid",
        fgColor: { argb: "FFF1F7FF" }
      };

      cell.border = {
        top: { style: "thin" },
        left: { style: "thin" },
        right: { style: "thin" },
        bottom: { style: "thin" }
      };
    });
  });

  // ======================
  // AUTO COLUMN WIDTH
  // ======================
  sheet.columns.forEach(col=>{
    let max = 10;

    col.eachCell(cell=>{
      const len = cell.value ? cell.value.toString().length : 10;
      if(len > max) max = len;
    });

    col.width = max + 4;
  });

  // ======================
  // DOWNLOAD
  // ======================
  const buffer = await workbook.xlsx.writeBuffer();

  const blob = new Blob([buffer], {
    type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
  });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "បញ្ជីចំណងដៃ.xlsx";
  link.click();
}
</script>

</body>
</html>
