<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<title>QR Scan PRO MAX + TOTAL + TELEGRAM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{
  margin:0;
  font-family:"Khmer OS Battambang",Arial;
  background:#eef3f8;
}

.appbar{
  background:linear-gradient(135deg,#1aa4bd,#0d6efd);
  color:#fff;
  padding:16px;
  text-align:center;
  font-weight:bold;
}

.card{
  background:#fff;
  margin:10px;
  padding:10px;
  border-radius:14px;
  box-shadow:0 6px 15px rgba(2, 104, 138, 0.709);
}

.row{display:flex;gap:10px;}

.btn{
  padding:12px;
  border:none;
  border-radius:4px;
  color:#0973a4;
   box-shadow:0 3px 10px rgba(111, 125, 2, 0.786);
  width:100%;
  font-weight:bold;
}
.home-btn{
  padding:10px 14px;
  color:rgb(234, 70, 21);
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-family:Khmer OS Battambang;
  font-size:14px;
  box-shadow:0 3px 10px rgba(4, 74, 171, 0.596);
  transition:0.3s;
}

.home-btn:hover{
  background:#6cb704;
  transform:scale(1.05);
}
.scan{background:#ebc4c49d;}
.upload{background:#c1c1b996;}
.btn.scan{
  padding:10px 14px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-family:Khmer OS Battambang;
  font-size:4px;
  box-shadow:0 3px 10px rgba(4, 74, 171, 0.596);
  transition:0.3s;
}


#reader{
  width:280px;
  height:280px;
  margin:auto;
  border:3px solid #e3e2e0;
  border-radius:14px;
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#1aa4bd;
  color:#fff;
  padding:10px;
}

td{
  padding:8px;
  border-bottom:2px solid #07567e76;
}

.ok{
  color:#0d6efd;
  font-weight:bold;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  justify-content:center;
  align-items:center;
}

.box{
  background:#fff;
  width:90%;
  max-width:340px;
  padding:15px;
  border-radius:12px;
}

input{
  width:95%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:8px;
}

.save{
  background:#1aa4bd;
  color:#fff;
  border:none;
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.close{
  background:#ff4d4d;
  color:#fff;
  border:none;
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
}

#loadingOverlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  color:#fff;
  font-size:18px;
  font-weight:bold;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#totalGuest{color:#0d6efd;font-size:18px;}
#totalUSD{color:#28a745;font-size:18px;font-weight:bold;}
#totalKHR{color:#ff9800;font-size:18px;font-weight:bold;}
</style>
</head>

<body>


<div class="card">
  <div class="row">
    <button class="home-btn" onclick="goBack()">ត្រឡប</button>

<button class="btn scan" onclick="startScan()">
  <img src="image.png" alt="scan" style="width:40px;height:40px;">
  

</button>

    <label class="btn upload">
      📁 Upload
      <input type="file" hidden accept="image/*" onchange="scanImage(this)">
    </label>
  </div>
</div>

<div id="reader"></div>
<div class="card">
  <h3>📄 Result</h3>
  <p id="result">—</p>
</div>
<!-- TOTAL -->
<div class="card">
  <p>👥 ភ្ញៀវ: <b id="totalGuest">0</b></p>
  <p>💵 USD: <b id="totalUSD">0</b> $</p>
  <p>💴 KHR: <b id="totalKHR">0</b> ៛</p>
</div>

<!-- TABLE -->
<div class="card">
  <h3>📋 Data</h3>
  <table>
    <thead>
      <tr>
        <th>ឈ្មោះ</th>
        <th>USD</th>
        <th>KHR</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box">
    <h3>📌 Scan Info</h3>

    <label>Name</label>
    <input id="name" readonly>

    <label>USD</label>
    <input id="usd" type="number">

    <label>KHR</label>
    <input id="khr" type="number">

    <button class="save" onclick="save()">💾 Save</button>
    <button class="close" onclick="closeModal()">❌ Close</button>
  </div>
</div>

<div id="loadingOverlay">⏳ កំពុងរក្សាទុក...</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBuKVB0z6NVtepmjE33qXxrxs8RcmCOwd0",
  authDomain:"create-db14a.firebaseapp.com",
  projectId:"create-db14a"
});

const db = firebase.firestore();
const qr = new Html5Qrcode("reader");

const modal = document.getElementById("modal");
const nameInput = document.getElementById("name");
const usdInput = document.getElementById("usd");
const khrInput = document.getElementById("khr");
const tableBody = document.getElementById("tableBody");

let scanned = false;
let cameraRunning = false;

/* TELEGRAM */
const BOT_TOKEN = "7654128263:AAG7Bfl_kPF9aOnE0hltHpCGqQlTE1H9wCg";
const CHAT_ID = "6567570219";


function sendToTelegram(data){

  const text =
`🔥 <b>QR PAYMENT RECEIPT</b> 🔥

━━━━━━━━━━━━━━
👤 <b>Name:</b> ${data.name}
💵 <b>USD:</b> <code>$${data.usd}</code>
💴 <b>KHR:</b> <code>${data.khr}៛</code>
━━━━━━━━━━━━━━
⏰ <b>Time:</b> ${new Date().toLocaleString()}
📌 <i>Thank you for your payment</i> 🙏
`;

  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      chat_id: CHAT_ID,
      text: text,
      parse_mode: "HTML"
    })
  });
}
async function getBestCameraId(){

  const cams = await Html5Qrcode.getCameras();

  if(!cams.length){
    throw new Error("No camera found");
  }

  let selected = cams[0].id;

  for(const cam of cams){
    const name = (cam.label || "").toLowerCase();

    if(name.includes("back") || name.includes("rear")){
      return cam.id; // 📱 mobile back camera
    }

    if(name.includes("usb") || name.includes("webcam")){
      selected = cam.id;
    }
  }

  return selected;
}
/* CLEAN */
function goBack(){
  window.location.href = "index.html";
}
function clean(t){
  return (t||"").replace(/[\uFFFD�]/g,"").trim();
}

/* SCAN */
async function startScan(){
  try{

    const cameraId = await getBestCameraId();

    if(cameraRunning){
      await qr.stop().catch(()=>{});
    }

    scanned = false;
    cameraRunning = true;

    await qr.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      (decodedText)=>{

        // show result
        document.getElementById("result").innerText = decodedText;

        if(scanned) return;
        scanned = true;

        qr.stop().catch(()=>{});
        cameraRunning = false;

        openModal(decodedText); // ✅ បើក form
      },
      (err)=>{}
    );

  }catch(e){
    alert("Camera Error: " + e.message);
  }
}



/* IMAGE */
async function scanImage(input){
  const file=input.files[0];
  const text=await qr.scanFile(file);
  openModal(text);
}

/* MODAL */
function openModal(name){
  modal.style.display="flex";
  nameInput.value=clean(name);
  usdInput.value="";
  khrInput.value="";
}

function closeModal(){
  modal.style.display="none";
}

/* SAVE */
function save(){

  const loading=document.getElementById("loadingOverlay");
  loading.style.display="flex";

  const data={
    name:nameInput.value,
    usd:Number(usdInput.value)||0,
    khr:Number(khrInput.value)||0,
    time:Date.now()
  };

  db.collection("qr_payments").add(data)
  .then(()=>{

    sendToTelegram(data);

    modal.style.display="none";

    if(cameraRunning){
      qr.stop().catch(()=>{});
      cameraRunning=false;
    }

    setTimeout(()=>location.reload(),800);

  })
  .catch(err=>{
    loading.style.display="none";
    alert(err);
  });
}

/* REALTIME + TOTAL */
db.collection("qr_payments")
.orderBy("time","desc")
.onSnapshot(snap=>{

  let html="";
  let totalUSD=0;
  let totalKHR=0;
  let count=0;

  snap.forEach(doc=>{
    const d=doc.data();

    count++;
    totalUSD+=Number(d.usd||0);
    totalKHR+=Number(d.khr||0);

    html+=`
      <tr>
        <td class="ok">${d.name||""}</td>
        <td>${d.usd||0} $</td>
        <td>${d.khr||0} ៛</td>
      </tr>
    `;
  });

  tableBody.innerHTML=html;

  document.getElementById("totalGuest").innerText=count;
  document.getElementById("totalUSD").innerText=totalUSD.toLocaleString();
  document.getElementById("totalKHR").innerText=totalKHR.toLocaleString();

});
</script>

</body>
</html>
