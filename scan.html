<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<title>ស្គែនឈ្មោះ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{
  margin:0;
  font-family:"Khmer OS Battambang",Arial;
  background:#eef3f8;
}

.appbar{
  background:linear-gradient(135deg,#1aa4bd,#0d6efd);
  color:#fff;
  padding:16px;
  text-align:center;
  font-weight:bold;
}

.card{
  background:#fff;
  margin:10px;
  padding:10px;
  border-radius:14px;
  box-shadow:0 6px 15px rgba(2, 104, 138, 0.709);
}

.row{display:flex;gap:10px;}

.btn{
  padding:12px;
  border:none;
  border-radius:4px;
  color:#0973a4;
   box-shadow:0 3px 10px rgba(121, 123, 123, 0.786);
  width:100%;
  font-weight:bold;
}
.home-btn{
  padding:10px 14px;
  color:rgb(234, 70, 21);
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-family:Khmer OS Battambang;
  font-size:14px;
  box-shadow:0 3px 10px rgba(4, 74, 171, 0.596);
  transition:0.3s;
}

.home-btn:hover{
  background:#6cb704;
  transform:scale(1.05);
}
.scan{background:#ebc4c49d;}
.upload{background:#c1c1b996;}
.btn.scan{
  padding:10px 14px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-family:Khmer OS Battambang;
  font-size:4px;
  box-shadow:0 3px 10px rgba(4, 74, 171, 0.596);
  transition:0.3s;
}


#reader{
  position:relative;
}

/* 🔥 Scan line */
.scan-line{
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:3px;
  background:linear-gradient(90deg,transparent,#00e5ff,transparent);
  box-shadow:0 0 10px #00e5ff;
  display:none;
  animation:scanMove 1.2s linear infinite;
}

@keyframes scanMove{
  0%{top:0;}
  100%{top:100%;}
}
table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#1aa4bd;
  color:#fff;
  padding:10px;
}

td{
  padding:8px;
  border-bottom:2px solid #07567e76;
}

.ok{
  color:#0d6efd;
  font-weight:bold;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  justify-content:center;
  align-items:center;
}

.box{
  background:#fff;
  width:90%;
  max-width:340px;
  padding:15px;
  border-radius:12px;
}

input{
  width:95%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:8px;
}

.save{
  background:#1aa4bd;
  color:#fff;
  border:none;
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.close{
  background:#ff4d4d;
  color:#fff;
  border:none;
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
}

#loadingOverlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  color:#fff;
  font-size:18px;
  font-weight:bold;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#totalGuest{color:#0d6efd;font-size:18px;}
#totalUSD{color:#28a745;font-size:18px;font-weight:bold;}
#totalKHR{color:#ff9800;font-size:18px;font-weight:bold;}
</style>
</head>

<body>


<div class="card">
  <div class="row">
    <button class="home-btn" onclick="goBack()">ត្រឡប</button>

<button class="btn scan" onclick="startScan()">
  <img src="image.png" alt="scan" style="width:40px;height:40px;">
  

</button>

    <label class="btn upload">
      📁 Upload
      <input type="file" hidden accept="image/*" onchange="scanImage(this)">
    </label>
  </div>
</div>
<div>
 
  <p id="result"></p>
</div>
<div id="reader">
  <div class="scan-line"></div>
 
</div>
<!-- TOTAL -->
<div class="card">
  <p>👥 ភ្ញៀវចងដៃ: <b id="totalGuest">0</b></p>
  <p>💵 ដុល្លារ: <b id="totalUSD">0</b> $</p>
  <p>💴 រៀល: <b id="totalKHR">0</b> ៛</p>
</div>

<!-- TABLE -->
<div class="card">
  <h3>📋 Data</h3>
  <table>
    <thead>
      <tr>
        <th>ឈ្មោះ</th>
        <th>USD</th>
        <th>KHR</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box">
    <h3>📌 Scan Info</h3>

    <label>Name</label>
    <input id="name" readonly>

    <label>USD</label>
    <input id="usd" type="number">

    <label>KHR</label>
    <input id="khr" type="number">

    <button class="save" onclick="save()">💾 Save</button>
    <button class="close" onclick="closeModal()">❌ Close</button>
  </div>
</div>

<div id="loadingOverlay">⏳ កំពុងរក្សាទុក...</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBuKVB0z6NVtepmjE33qXxrxs8RcmCOwd0",
  authDomain:"create-db14a.firebaseapp.com",
  projectId:"create-db14a"
});

const db = firebase.firestore();
const qr = new Html5Qrcode("reader");
const scanSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
scanSound.preload = "auto";

const modal = document.getElementById("modal");
const nameInput = document.getElementById("name");
const usdInput = document.getElementById("usd");
const khrInput = document.getElementById("khr");
const tableBody = document.getElementById("tableBody");

let scanned = false;
let cameraRunning = false;

/* TELEGRAM */
const BOT_TOKEN = "7654128263:AAG7Bfl_kPF9aOnE0hltHpCGqQlTE1H9wCg";
const CHAT_ID = "6567570219";


async function sendToTelegram(data){

  const text =
`🔥 <b>QR PAYMENT RECEIPT</b> 🔥

━━━━━━━━━━━━━━
👤 <b>Name:</b> ${data.name}
💵 <b>USD:</b> <code>$${data.usd}</code>
💴 <b>KHR:</b> <code>${data.khr}៛</code>
━━━━━━━━━━━━━━
⏰ <b>Time:</b> ${new Date().toLocaleString()}
`;

  try{

    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        chat_id: CHAT_ID,
        text: text,
        parse_mode: "HTML"
      })
    });

    const result = await res.json();
    console.log("Telegram result:", result);

    if(!result.ok){
      alert("Telegram Error: " + result.description);
    }

  }catch(err){
    console.log("Telegram fetch failed:", err);
    alert("Telegram network error");
  }
}


async function getBestCameraId(){

  const cams = await Html5Qrcode.getCameras();

  if(!cams.length){
    throw new Error("No camera found");
  }

  let selected = cams[0].id;

  for(const cam of cams){
    const name = (cam.label || "").toLowerCase();

    if(name.includes("back") || name.includes("rear")){
      return cam.id; // 📱 mobile back camera
    }

    if(name.includes("usb") || name.includes("webcam")){
      selected = cam.id;
    }
  }

  return selected;
}
/* CLEAN */
function goBack(){
  window.location.href = "index.html";
}
function clean(t){
  return (t||"").replace(/[\uFFFD�]/g,"").trim();
}

/* SCAN */
async function startScan(){
  try{

    const cameraId = await getBestCameraId();

    // 🔥 stop previous camera safely
    if(cameraRunning){
      await safeStop();
    }

    scanned = false;
    cameraRunning = true;

    // 🔥 show scan animation line
    showScanLine();

    await qr.start(
      cameraId,
      {
        fps: 10,
        qrbox: 250
      },
      async (decodedText)=>{
       scanSound.currentTime = 0;
       scanSound.play().catch(()=>{});
       navigator.vibrate?.(150); // optional
        // show result
        document.getElementById("result").innerText = decodedText;

        if(scanned) return;
        scanned = true;

        // 🔥 stop scan
        await safeStop();

        // 🔥 hide scan animation
        hideScanLine();

        // open modal
        openModal(decodedText);

      },
      (err)=>{}
    );

  }catch(e){
    hideScanLine();
    alert("Camera Error: " + e.message);
  }
}
async function safeStop(){
  try{
    if(cameraRunning){
      await qr.stop();
    }
  }catch(e){
    console.log("stop error:", e);
  }
  cameraRunning = false;
}
function showScanLine(){
  const line = document.querySelector(".scan-line");
  if(line) line.style.display = "block";
}

function hideScanLine(){
  const line = document.querySelector(".scan-line");
  if(line) line.style.display = "none";
}



/* IMAGE */
async function scanImage(input){
  const file=input.files[0];
  const text=await qr.scanFile(file);
  openModal(text);
}

/* MODAL */
function openModal(name){
  modal.style.display="flex";
  nameInput.value=clean(name);
  usdInput.value="";
  khrInput.value="";
}

function closeModal(){
  modal.style.display="none";
}

/* SAVE */
async function save(){

  const loading=document.getElementById("loadingOverlay");
  loading.style.display="flex";

  const data={
    name:nameInput.value,
    usd:Number(usdInput.value)||0,
    khr:Number(khrInput.value)||0,
    time:Date.now()
  };

  try{

    await db.collection("qr_payments").add(data);

    await sendToTelegram(data);

    modal.style.display="none";

    await safeStop();

    setTimeout(()=>location.reload(),800);

  }catch(err){
    alert(err);
  }finally{
    loading.style.display="none";
  }
}

/* REALTIME + TOTAL */
db.collection("qr_payments")
.orderBy("time","desc")
.onSnapshot(snap=>{

  let html="";
  let totalUSD=0;
  let totalKHR=0;
  let count=0;

  snap.forEach(doc=>{
    const d=doc.data();

    count++;
    totalUSD+=Number(d.usd||0);
    totalKHR+=Number(d.khr||0);

    html+=`
      <tr>
        <td class="ok">${d.name||""}</td>
        <td>${d.usd||0} $</td>
        <td>${d.khr||0} ៛</td>
      </tr>
    `;
  });

  tableBody.innerHTML=html;

  document.getElementById("totalGuest").innerText=count;
  document.getElementById("totalUSD").innerText=totalUSD.toLocaleString();
  document.getElementById("totalKHR").innerText=totalKHR.toLocaleString();

});
</script>

</body>
</html>
